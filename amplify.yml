version: 1
applications:
  - appRoot: apps/dashboard
    frontend:
      phases:
        preBuild:
          commands:
            - (cd ../.. && npm install --no-audit --no-fund --no-package-lock)
            - env | grep -e NEXT_PUBLIC_ >> .env.production || true
        build:
          commands:
            - (cd ../.. && npm run build --workspace=packages/types && npm run build --workspace=apps/dashboard)
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
