[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# --include=dev — Railway sets NODE_ENV=production which makes plain
# `npm ci` skip devDependencies. typescript + @types/* are devDeps and
# required at build time (tsc → dist/). Without this flag, build fails
# with TS7016 errors.
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = [
  "npm run build --workspace=packages/types",
  "npm run build --workspace=packages/schemas",
  "npm run build --workspace=packages/db",
  "npm run build --workspace=packages/queue",
  "npm run build --workspace=apps/api"
]

[start]
cmd = "node apps/api/dist/index.js"
