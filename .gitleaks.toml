[extend]
useDefault = true

[[rules]]
description = "Supabase Service Role Key"
id = "supabase-service-key"
regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[^"'\s]{50,}'''
tags = ["key", "supabase"]

[[rules]]
description = "Railway Token"
id = "railway-token"
regex = '''[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'''
tags = ["key", "railway"]

[allowlist]
description = "Ignore .env.example and docs"
paths = [".env.example", "*.md", "SPRINT1_READINESS.md"]
