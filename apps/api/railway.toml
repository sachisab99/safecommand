[build]
builder = "nixpacks"
# --include=dev forces installation of devDependencies (typescript, @types/*).
# Railway sets NODE_ENV=production which makes plain `npm ci` skip devDeps,
# but `tsc` itself + Express/Cors type declarations are devDeps and required
# at build time. Without this flag, build fails with TS7016 errors.
buildCommand = "npm ci --include=dev && npm run build --workspace=packages/types --workspace=packages/schemas --workspace=packages/db --workspace=packages/queue --workspace=apps/api"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
numReplicas = 2
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
